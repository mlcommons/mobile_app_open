# Bumped from 2048m: Flutter 3.44 / AGP 8.11 release builds (especially the
# unified all-backends bundle) need more heap. 2048m OOMed in mergeReleaseNativeLibs.
org.gradle.jvmargs=-Xmx4096m
android.useAndroidX=true
# Jetifier is not needed — every Android dependency is already AndroidX-native
# (native backends are C++ via bazel). Leaving it on ran a JetifyTransform over
# the Flutter engine .jars that exhausted the Gradle daemon heap (Java heap space).
android.enableJetifier=false
