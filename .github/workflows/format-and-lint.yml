name: Format & lint

on:
  push:
    branches: [ master, submission-v* ]
  pull_request:
    types: [ opened, synchronize, reopened ]
  merge_group:
    types: [ checks_requested ]

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/mlcommons/mobile_app_open-formatter
          flavor: latest=true
          tags: type=raw,value=${{ github.run_number }}
      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: tools/formatter
          file: tools/formatter/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bazel:
    needs: build-image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mlcommons/mobile_app_open-formatter:${{ github.run_number }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: configure Git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: bazel
        run: make lint/bazel

  cpp:
    name: C++
    needs: build-image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mlcommons/mobile_app_open-formatter:${{ github.run_number }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: configure Git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: clang
        run: make lint/clang

  dart:
    needs: build-image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mlcommons/mobile_app_open-formatter:${{ github.run_number }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: configure Git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Cache Flutter packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /home/mlperf/.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-cache-
      - name: flutter/prepare
        run: make flutter/prepare
      - name: pub-get
        run: make format/dart/pub-get
      - name: lint/dart
        run: make lint/dart

  swift:
    needs: build-image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mlcommons/mobile_app_open-formatter:${{ github.run_number }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: configure Git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: swift
        run: make lint/swift

  markdown:
    needs: build-image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mlcommons/mobile_app_open-formatter:${{ github.run_number }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: configure Git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: markdown-format
        run: make lint/markdown

  pbtxt:
    needs: build-image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mlcommons/mobile_app_open-formatter:${{ github.run_number }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: configure Git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: pbtxt
        run: make lint/pbtxt

  yaml:
    needs: build-image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mlcommons/mobile_app_open-formatter:${{ github.run_number }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: configure Git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: yaml
        run: make lint/yaml

  ts:
    name: TypeScript
    needs: build-image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mlcommons/mobile_app_open-formatter:${{ github.run_number }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: configure Git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: typescripts
        run: make lint/ts

  misc:
    needs: build-image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mlcommons/mobile_app_open-formatter:${{ github.run_number }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: configure Git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: prohibited-extensions
        run: make lint/prohibited-extensions
      - name: big-files
        run: make lint/big-files
      - name: line-endings
        run: make lint/line-endings
